<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>What's Buzzing — 多源新闻聚合</title>
    <meta name="description" content="What's Buzzing — 多源新闻聚合，AI 翻译与要闻总结。追踪 Hacker News、知乎、路透社、BBC、彭博社等 18 个来源的热门内容。" />
    <meta name="theme-color" content="#f7f8f8" />
    <meta property="og:title" content="What's Buzzing" />
    <meta property="og:description" content="多源新闻聚合，AI 翻译与要闻总结" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="./favicon.svg" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="What's Buzzing" />
    <meta name="twitter:description" content="多源新闻聚合，AI 翻译与要闻总结" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Typography: Lora for editorial English headings -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..740;1,400..740&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./styles.css" />

    <!-- Runtime config injected for the frontend.  Keep in sync with
         NON_TRANSLATABLE_SOURCES in server.py. -->
    <script>
      window.__WHATS_BUZZING_CONFIG__ = {
        nonTranslatableSources: ["zhihu", "google_zh", "linux_do", "linux_do_top", "hupu_nba", "hupu_soccer", "hupu_lol"],
      };
    </script>
  </head>
  <body>
    <!-- ============================================================
    TOPBAR — brand, category tabs, actions
    ============================================================ -->
    <header class="topbar" id="topbar">
      <div class="topbar-body">
        <div class="brand">
          <svg class="mark" width="26" height="26" viewBox="0 0 32 32" aria-hidden="true">
            <rect width="32" height="32" rx="9" fill="#f0652f"/>
            <circle cx="16" cy="16" r="8" fill="none" stroke="#fff" stroke-width="2.2"/>
            <circle cx="16" cy="16" r="2.6" fill="#fff"/>
          </svg>
          <h1>What's Buzzing</h1>
          <span id="lastUpdated" class="last-updated" hidden></span>
        </div>

        <nav id="categoryTabs" class="category-tabs" aria-label="新闻类别"></nav>

        <div class="actions" role="group" aria-label="工具栏">
          <button
            id="summaryButton"
            class="icon-button summary-button"
            type="button"
            aria-label="AI 总结"
            title="AI 总结今日要闻"
          >
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" aria-hidden="true">
              <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/>
            </svg>
          </button>
          <button
            id="searchButton"
            class="icon-button"
            type="button"
            aria-label="搜索文章"
            title="搜索文章"
          >
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
            </svg>
          </button>
          <button
            id="helpButton"
            class="icon-button"
            type="button"
            aria-label="键盘快捷键"
            title="键盘快捷键"
          >
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
              <circle cx="12" cy="12" r="10"/>
              <path d="M12 17h.01"/>
            </svg>
          </button>
          <button
            id="themeButton"
            class="icon-button"
            type="button"
            aria-label="切换夜间模式"
            title="切换夜间模式"
          >
            <!-- Moon icon (light mode default) — swapped by JS -->
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <!-- Search bar (hidden by default) -->
    <div id="searchBar" class="search-bar" hidden>
      <div class="search-bar-inner">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" class="search-icon">
          <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        </svg>
        <input
          id="searchInput"
          class="search-input"
          type="text"
          placeholder="搜索文章标题…"
          autocomplete="off"
        />
        <span id="searchCount" class="search-count" hidden></span>
        <button id="searchClose" class="search-close" type="button" aria-label="关闭搜索">&times;</button>
      </div>
    </div>

    <!-- ============================================================
    MAIN — error notice + multi-column feed board
    ============================================================ -->
    <main class="shell">
      <section id="errorBox" class="notice" hidden></section>
      <section id="feed" class="feed" aria-live="polite"></section>
    </main>

    <!-- ============================================================
    TEMPLATE — article card (cloned by JS renderer)
    ============================================================ -->
    <template id="articleTemplate">
      <article class="story">
        <a class="media" target="_blank" rel="noreferrer">
          <img loading="lazy" />
        </a>
        <div class="story-body">
          <a class="title" target="_blank" rel="noreferrer"></a>
          <p class="summary"></p>
          <div class="links">
            <time class="card-time"></time>
            <button class="expand-toggle" type="button">展开</button>
            <a class="discussion" target="_blank" rel="noreferrer">讨论</a>
          </div>
        </div>
      </article>
    </template>

    <!-- Application entry point (ES module) -->
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
